<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="robots" content="noindex, nofollow">
<title>AMERICAN NAIL — 2025</title>
<style>
@font-face {
  font-family: 'Inter';
  src: url('fonts/Inter-Regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Inter';
  src: url('fonts/Inter-Bold.woff2') format('woff2');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'DM Serif Text';
  src: url('fonts/DMSerifText-Regular.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'JetBrains Mono';
  src: url('fonts/JetBrainsMono-Latin.woff2') format('woff2');
  font-weight: 300 500;
  font-style: normal;
  font-display: swap;
}

:root {
  --bg: #000000;
  --bg-deep: #000000;
  --bg-surface: rgba(255,255,255,0.03);
  --text: #ECEEE2;
  --text-secondary: rgba(236,238,226,0.5);
  --text-muted: rgba(236,238,226,0.2);
  --accent: #E85D2C;
  --accent-soft: rgba(232,93,44,0.12);
  --divider: rgba(236,238,226,0.08);
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  color: var(--text);
  background: var(--bg);
  line-height: 1.35;
  overflow-x: hidden;
}

/* Subtle grain */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 128px;
  opacity: 0.018;
  pointer-events: none;
  z-index: 10000;
}

/* ─── NAV ─── */
.nav {
  display: none;
}
.nav-logo { display: flex; align-items: center; gap: 14px }
.nav-logo svg { height: 18px; width: auto }
.nav-logo-label {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 11px;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ─── SLIDE WRAPPER ─── */
.slide {
  height: 100vh;
  height: 100dvh;
  width: 100vw;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: var(--bg);
}
/* Portrait: shrink slide wrapper to match scaled 16:9 content */
@media (orientation: portrait) {
  .slide {
    height: calc(100vw * 9 / 16);
  }
}

/* ─── LAYOUT ─── */
.section {
  width: 1600px;
  height: 900px;
  padding: 32px 200px;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
  overflow-y: auto;
  scroll-behavior: smooth;
  flex-shrink: 0;
  transform-origin: center center;
}
.section::before, .section::after {
  content: '';
  flex: 1 1 0px;
  min-height: 0;
}
.section::-webkit-scrollbar { display: none; }
.section { -ms-overflow-style: none; scrollbar-width: none; }
.section-label {
  font-family: 'Inter', sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.section-title {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 56px;
  line-height: 1.08;
  letter-spacing: 0;
  color: var(--text);
  margin-bottom: 16px;
}
.section-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 720px;
  line-height: 1.35;
  font-weight: 400;
}
.section-divider {
  display: none;
}

/* ─── REVEALS ─── */
.reveal {
  opacity: 0;
  transform: translateY(32px);
  transition: opacity 1s cubic-bezier(0.16,1,0.3,1), transform 1s cubic-bezier(0.16,1,0.3,1);
}
.reveal.visible { opacity: 1; transform: none }
.reveal-delay-1 { transition-delay: 0.08s }
.reveal-delay-2 { transition-delay: 0.16s }
.reveal-delay-3 { transition-delay: 0.24s }
.reveal-delay-4 { transition-delay: 0.32s }

/* ─── HERO ─── */
.hero {
  width: 1600px;
  height: 900px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 100px 200px;
  position: relative;
  background: none;
  overflow: hidden;
  flex-shrink: 0;
  transform-origin: center center;
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(232,93,44,0.15) 0%, transparent 70%);
  z-index: 0;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1;
}
.hero > * { position: relative; z-index: 2; }
.hero-title {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 180px;
  line-height: 0.88;
  letter-spacing: 0;
  color: var(--text);
  animation: heroReveal 1.2s cubic-bezier(0.16,1,0.3,1) 0.1s both;
}
.hero-logo-lockup {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
}
.hero-logo-brand {
  height: 44px;
  width: auto;
  margin-bottom: 8px;
}
.hero-descriptor {
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.05em;
  margin-top: 32px;
  text-transform: uppercase;
  animation: heroReveal 0.8s cubic-bezier(0.16,1,0.3,1) 0.4s both;
}
.hero-benefit {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 48px;
  line-height: 1.2;
  color: var(--text);
  margin-top: 48px;
  letter-spacing: 0;
  animation: heroReveal 0.8s cubic-bezier(0.16,1,0.3,1) 0.6s both;
}
.hero-stats {
  display: flex;
  gap: 64px;
  margin-top: 48px;
  animation: heroReveal 0.8s cubic-bezier(0.16,1,0.3,1) 0.9s both;
}
.stat-block { text-align: center }
.stat-number {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 44px;
  color: var(--text);
  line-height: 1;
}
.stat-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 400;
  color: var(--text-muted);
  margin-top: 12px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.hero-scroll {
  position: absolute; bottom: 48px;
  left: 50%; transform: translateX(-50%);
  animation: heroReveal 0.6s cubic-bezier(0.16,1,0.3,1) 1.4s both;
}
.hero-scroll span {
  display: block;
  font-family: 'Inter', sans-serif;
  font-size: 10px; font-weight: 400;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 12px;
}
.scroll-line {
  width: 1px; height: 48px;
  background: var(--text-muted);
  margin: 0 auto;
  animation: scrollPulse 2.5s ease-in-out infinite;
}

@keyframes heroReveal {
  from { opacity: 0; transform: translateY(24px) }
  to { opacity: 1; transform: translateY(0) }
}
@keyframes scrollPulse {
  0%,100% { opacity: 0.2; transform: scaleY(0.4) }
  50% { opacity: 0.8; transform: scaleY(1) }
}

/* ─── ACT DIVIDER ─── */
.act-divider {
  width: 1600px;
  height: 900px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center;
  padding: 120px 200px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
  transform-origin: center center;
}
.act-divider::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 50%, rgba(0,0,0,0.95) 100%);
  z-index: 0;
}
.act-divider.has-bg::before {
  background: radial-gradient(ellipse 60% 80% at center 40%, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.8) 50%, #000000 100%);
}
.act-divider > * { position: relative; z-index: 1; }
.act-divider .act-label {
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 32px;
}
.act-divider .act-title {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 72px;
  line-height: 1.08;
  color: var(--text);
  margin-bottom: 24px;
}
.act-divider .act-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 640px;
  line-height: 1.5;
}
.act-divider .act-stats {
  display: flex;
  gap: 64px;
  margin-top: 48px;
}

/* ─── PLATFORM GRID ─── */
.platform-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 100px;
  align-items: start;
  margin-top: 64px;
}
.platform-text p {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.35;
  margin-bottom: 24px;
  font-weight: 400;
}
.platform-text strong { color: var(--text); font-weight: 700 }

/* ─── CAPABILITIES ─── */
.cap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  margin-top: 64px;
  background: var(--divider);
  border: 1px solid var(--divider);
  border-radius: 8px;
  overflow: hidden;
}
.cap-grid.cols-4 { grid-template-columns: repeat(4, 1fr) }
.cap-grid.cols-2 { grid-template-columns: repeat(2, 1fr) }
.cap-card {
  background: var(--bg);
  padding: 32px 32px;
}
.cap-card.featured { background: rgba(232,93,44,0.04) }
.cap-icon {
  font-family: 'Inter', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 24px;
  line-height: 1;
}
.cap-card h4 {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 16px;
  color: var(--text);
  margin-bottom: 16px;
}
.cap-card p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.35;
  font-weight: 400;
}
.cap-card .highlight {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--accent);
  background: var(--accent-soft);
  padding: 2px 8px;
  border-radius: 3px;
}

/* ─── PARTNER GRID ─── */
.partner-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  margin-top: 24px;
  background: var(--divider);
  border: 1px solid var(--divider);
  border-radius: 8px;
  overflow: hidden;
}
.partner-card {
  background: var(--bg);
  padding: 20px 24px;
  cursor: pointer;
}
.partner-card .pc-stats { transition: max-height 0.35s ease, opacity 0.3s ease; overflow: hidden; }
.partner-card .pc-chevron { display: none; }
@media (max-width: 1024px) {
  .partner-card .pc-stats { max-height: 0; opacity: 0; }
  .partner-card.pc-open .pc-stats { max-height: 300px; opacity: 1; }
  .partner-card .pc-chevron {
    display: inline-block; margin-left: auto; opacity: 0.4;
    transition: transform 0.3s ease;
  }
  .partner-card.pc-open .pc-chevron { transform: rotate(180deg); opacity: 0.7; }
  .partner-card .pc-header { display: flex; align-items: center; gap: 8px; }
}
.partner-card.featured { background: rgba(232,93,44,0.03) }
.partner-card .pc-name {
  font-family: 'Inter', sans-serif;
  font-weight: 700; font-size: 20px;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.partner-card.featured .pc-name { color: var(--accent) }
.partner-card .pc-type {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
}
.pc-stat {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid var(--divider);
  font-size: 13px;
  font-weight: 400;
  gap: 12px;
}
.pc-stat:last-child { border-bottom: none }
.pc-stat span:first-child { color: var(--text-muted); flex-shrink: 0; white-space: nowrap; font-size: 11px }
.pc-stat span:last-child {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 12px;
  color: var(--text-secondary);
  text-align: right;
}
.partner-card.featured .pc-stat span:last-child { color: var(--text) }

/* ─── COMPARISON TABLE ─── */
.comparison-table {
  margin-top: 40px;
  border: 1px solid var(--divider);
  border-radius: 8px;
  overflow: hidden;
}
.comparison-header {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.2fr;
  background: rgba(255,255,255,0.02);
  border-bottom: 1px solid var(--divider);
}
.comparison-header div {
  padding: 12px 32px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.comparison-header .ch-label { color: var(--text-secondary) }
.comparison-header .ch-core { color: var(--accent) }
.comparison-header .ch-other { color: var(--text-secondary) }
.comparison-row {
  display: grid;
  grid-template-columns: 2fr 1.2fr 1.2fr;
  border-bottom: 1px solid var(--divider);
}
.comparison-row:last-child { border-bottom: none }
.comparison-row div {
  padding: 10px 32px;
  font-size: 13px;
  font-weight: 400;
  display: flex;
  align-items: center;
}
.comparison-row .cr-label {
  color: var(--text-secondary);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
}
.comparison-row .cr-core {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 13px;
  color: var(--text);
}
.comparison-row .cr-other {
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 13px;
  color: var(--text-secondary);
}
.cr-check {
  display: inline-block;
  color: var(--accent);
  margin-right: 6px;
  font-size: 14px;
}
.cr-x {
  display: inline-block;
  color: rgba(236,238,226,0.35);
  margin-right: 6px;
  font-size: 14px;
}
.comparison-footnote {
  padding: 20px 32px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--text-secondary);
  border-top: 1px solid var(--divider);
  background: rgba(255,255,255,0.01);
  line-height: 1.6;
}

/* ─── BAR CHART ─── */
.bar-chart {
  margin-top: 40px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  height: 260px;
  padding-bottom: 48px;
  position: relative;
  border-bottom: 1px solid var(--divider);
}
.bar-chart .bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
  position: relative;
}
.bar-chart .bar-fill {
  width: 100%;
  max-width: 80px;
  background: var(--accent);
  border-radius: 4px 4px 0 0;
  transition: height 1s cubic-bezier(0.16,1,0.3,1);
  position: relative;
}
.bar-chart .bar-fill.muted {
  background: rgba(232,93,44,0.25);
}
.bar-chart .bar-value {
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--text);
  margin-bottom: 8px;
  white-space: nowrap;
}
.bar-chart .bar-label {
  position: absolute;
  bottom: -40px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ─── ACCORDION PANELS ─── */
.accordion-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 24px;
  background: rgba(232,93,44,0.04);
  border: 1px solid rgba(232,93,44,0.15);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.accordion-row:hover {
  border-color: rgba(232,93,44,0.35);
}
.accordion-expand {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease, opacity 0.4s ease;
  opacity: 0;
}
.accordion-body {
  padding: 20px 24px;
  border: 1px solid rgba(232,93,44,0.15);
  border-top: none;
  border-radius: 0 0 12px 12px;
  background: rgba(232,93,44,0.03);
}
.accordion-chevron {
  width: 20px;
  height: 20px;
  opacity: 0.4;
  transition: transform 0.3s ease;
  flex-shrink: 0;
}

/* ─── TAB COMPONENT ─── */
.core-tab {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 8px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px 8px 0 0;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
  border-bottom: 2px solid transparent;
}
.core-tab-active {
  border: 1px solid rgba(232,93,44,0.3);
  background: rgba(232,93,44,0.08);
  color: var(--accent);
  border-bottom: 2px solid var(--accent);
}
.tab-container {
  border: 1px solid rgba(232,93,44,0.15);
  border-top: none;
  border-radius: 0 0 12px 12px;
  padding: 28px;
  background: rgba(232,93,44,0.03);
}

/* ─── DETAIL CARDS ─── */
.detail-card {
  padding: 18px;
  background: rgba(0,0,0,0.15);
  border-radius: 8px;
}

/* ─── GRID TABLE ─── */
.grid-table-header {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 8px 12px;
  border-bottom: 1px solid var(--divider);
}
.grid-table-row {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 10px 12px;
  border-bottom: 1px solid var(--divider);
}
.grid-table-row:last-child {
  border-bottom: none;
}

/* ─── TIMELINE ─── */
.timeline-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  margin-top: 64px;
  background: var(--divider);
  border: 1px solid var(--divider);
  border-radius: 8px;
  overflow: hidden;
}
.timeline-card {
  background: var(--bg);
  padding: 48px 40px;
}
.timeline-card.current { background: rgba(232,93,44,0.04) }
.timeline-year {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 16px;
}
.timeline-card.current .timeline-year { color: var(--accent) }
.timeline-number {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 48px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 16px;
}
.timeline-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.35;
  font-weight: 400;
}
.timeline-tag {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  margin-top: 20px;
}

/* ─── ECON CALLOUT ─── */
.econ-callout {
  margin-top: 20px;
  padding: 20px 32px;
  border: 1px solid var(--divider);
  border-radius: 8px;
  text-align: center;
}
.econ-callout-number {
  font-family: 'DM Serif Text', serif;
  font-weight: 400;
  font-size: 52px;
  color: var(--text);
  line-height: 1;
}
.econ-callout-label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 16px;
  font-weight: 400;
}

/* ─── CHANNELS ─── */
.channels-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  margin-top: 64px;
  background: var(--divider);
  border: 1px solid var(--divider);
  border-radius: 8px;
  overflow: hidden;
}
.channel-card {
  background: var(--bg);
  padding: 48px 40px;
}
.channel-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 700;
